<!DOCTYPE html>
<html lang="en">

    <head>

        <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
  rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Battle Submarines</title>
    </head>

    <body>

        <header>

            <nav>
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="lobby.html">Waiting room</a>
                <a href="play.html">Play</a>
            </nav>
            
            <h1>Battle Submarines</h1>
        </header>

        <main>
            <section class="session-info">
                <h4>Session: Alex's Game</h4>
                <h4>Host: Alex</h4>
                <h4>Players: 3/8</h4>
            </section>

            <section class="players">
                <h2>Players</h2>

                <ul>
                <li>Alex (Host)</li>
                <li>SeaWolf</li>
                <li>You</li>
                <li>Player joining...</li>
                </ul>
            </section>

            <section class="submarine-color">
                <label for="colorPicker">Submarine Color:</label>
                    <input type="color" id="colorPicker" name="colorPicker" value="#ff0000">
            </section>

            <section>
                <button id="readyButton">Ready</button>
                <button id="leaveButton">Leave</button>
            </section>

            <section class="chat">
                <h3>Chat</h3>

                <div id="chat-box">
                    <p><strong>Alex:</strong> Welcome</p>
                    <p><strong>SeaWolf:</strong> r?</p>
                    <p><strong>You:</strong> Someone's joining</p>
                </div>

                <form id="chat-form">
                    <label for="chatbox">Chat Message:</label>
                    <input type="text" id="chatbox" placeholder="Type your message..." />
                    <button type="submit">Send</button>
                </form>
            </section>
            
        </main>

    <footer>
        <div>
            <p> Luis Rosas </p>
            <p> <a href="https://github.com/hazor25/startup" target="_blank">GitHub</a> </p>
        </div>

        </div>
    </footer>

  </body>

</html>
